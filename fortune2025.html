<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>2025 下半年命運之鏡</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;900&family=EB+Garamond:ital,wght@0,400;0,500;1,400&family=Noto+Serif+TC:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
:root {
  --void: #04040f;
  --deep: #0a0820;
  --indigo: #13103a;
  --violet: #1e1450;
  --gold: #c9a84c;
  --gold-light: #e8c86d;
  --gold-dim: #8a6e2f;
  --rose: #e8b4b8;
  --rose-dim: #c4878d;
  --silver: #d4cfe8;
  --silver-dim: #9990bb;
  --white: #f5f0ff;
  --glow-gold: rgba(201,168,76,0.4);
  --glow-rose: rgba(232,180,184,0.3);
  --glow-violet: rgba(120,80,200,0.3);
}

* { margin: 0; padding: 0; box-sizing: border-box; }

html { scroll-behavior: smooth; }

body {
  background: var(--void);
  color: var(--white);
  font-family: 'Noto Serif TC', serif;
  min-height: 100vh;
  overflow-x: hidden;
  cursor: crosshair;
}

/* ── STARFIELD ── */
#starfield {
  position: fixed; inset: 0; z-index: 0;
  pointer-events: none;
}
.star {
  position: absolute;
  background: white;
  border-radius: 50%;
  animation: twinkle var(--d, 3s) ease-in-out infinite var(--delay, 0s);
}
@keyframes twinkle {
  0%,100% { opacity: var(--min-op, 0.2); transform: scale(1); }
  50% { opacity: 1; transform: scale(1.4); }
}

/* ── NEBULA BLOBS ── */
.nebula {
  position: fixed; pointer-events: none; z-index: 0;
  border-radius: 50%; filter: blur(80px);
  animation: drift 20s ease-in-out infinite alternate;
}
.nebula-1 { width:600px;height:600px; background:radial-gradient(circle,rgba(80,40,160,0.25),transparent 70%); top:-100px;left:-150px; }
.nebula-2 { width:500px;height:500px; background:radial-gradient(circle,rgba(160,40,100,0.2),transparent 70%); bottom:-50px;right:-100px; animation-delay:-7s; }
.nebula-3 { width:400px;height:400px; background:radial-gradient(circle,rgba(40,80,180,0.2),transparent 70%); top:40%;left:40%; animation-delay:-12s; }
@keyframes drift { from{transform:translate(0,0) scale(1)} to{transform:translate(30px,40px) scale(1.1)} }

/* ── MAIN WRAPPER ── */
.universe {
  position: relative; z-index: 1;
  max-width: 860px; margin: 0 auto;
  padding: 60px 24px 100px;
}

/* ── HEADER ── */
.site-header {
  text-align: center; margin-bottom: 64px;
  animation: fadeDown 1.2s ease both;
}
.header-eyebrow {
  font-family: 'Cinzel', serif;
  font-size: 11px; letter-spacing: 6px;
  color: var(--gold-dim); text-transform: uppercase;
  margin-bottom: 20px;
}
.header-title {
  font-family: 'Cinzel', serif;
  font-size: clamp(32px,6vw,68px);
  font-weight: 900; line-height: 1.1;
  background: linear-gradient(135deg, var(--gold-light) 0%, var(--rose) 50%, var(--gold) 100%);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  background-clip: text; text-fill-color: transparent;
  margin-bottom: 16px;
}
.header-subtitle {
  font-family: 'EB Garamond', serif;
  font-size: 17px; font-style: italic;
  color: var(--silver-dim); line-height: 1.7;
}
.header-divider {
  display: flex; align-items: center; gap: 16px;
  margin: 28px auto 0; max-width: 320px;
}
.header-divider::before, .header-divider::after {
  content: ''; flex: 1; height: 1px;
  background: linear-gradient(90deg, transparent, var(--gold-dim));
}
.header-divider::after { background: linear-gradient(90deg, var(--gold-dim), transparent); }
.divider-gem { color: var(--gold); font-size: 14px; }

/* ── FORM CARD ── */
.ritual-card {
  background: linear-gradient(160deg, rgba(30,20,80,0.9) 0%, rgba(10,8,32,0.95) 100%);
  border: 1px solid rgba(201,168,76,0.25);
  border-radius: 24px;
  padding: 48px 40px;
  position: relative; overflow: hidden;
  box-shadow: 0 0 80px rgba(80,40,160,0.3), 0 0 0 1px rgba(201,168,76,0.1) inset;
  animation: fadeUp 1.2s ease 0.3s both;
}
.ritual-card::before {
  content: '';
  position: absolute; top: 0; left: 0; right: 0; height: 1px;
  background: linear-gradient(90deg, transparent, var(--gold), var(--rose), var(--gold), transparent);
}
.ritual-card::after {
  content: '';
  position: absolute; inset: 0;
  background: radial-gradient(ellipse at top, rgba(120,80,200,0.08), transparent 60%);
  pointer-events: none;
}

.section-label {
  font-family: 'Cinzel', serif;
  font-size: 11px; letter-spacing: 5px;
  color: var(--gold); text-transform: uppercase;
  margin-bottom: 32px; text-align: center;
}

/* ── FORM GRID ── */
.form-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 20px 28px;
}
.form-field { display: flex; flex-direction: column; gap: 8px; }
.form-field.full { grid-column: 1/-1; }

.field-label {
  font-size: 11px; letter-spacing: 3px;
  color: var(--silver-dim); text-transform: uppercase;
}
.field-label span { color: var(--gold); margin-left: 2px; }

.field-input, .field-select {
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(201,168,76,0.2);
  border-radius: 10px;
  padding: 14px 18px;
  color: var(--white);
  font-family: 'Noto Serif TC', serif;
  font-size: 15px;
  transition: all 0.3s ease;
  width: 100%;
  -webkit-appearance: none;
}
.field-select option { background: #1e1450; color: var(--white); }
.field-input::placeholder { color: rgba(180,160,220,0.35); }
.field-input:focus, .field-select:focus {
  outline: none;
  border-color: var(--gold);
  background: rgba(201,168,76,0.07);
  box-shadow: 0 0 0 3px rgba(201,168,76,0.12), 0 0 20px rgba(201,168,76,0.1);
}
.field-input[type="date"]::-webkit-calendar-picker-indicator { filter: invert(0.8) sepia(0.5) hue-rotate(200deg); }
.field-input[type="time"]::-webkit-calendar-picker-indicator { filter: invert(0.8) sepia(0.5) hue-rotate(200deg); }

.radio-row {
  display: flex; gap: 12px;
}
.radio-opt {
  flex: 1; padding: 12px;
  border: 1px solid rgba(201,168,76,0.2);
  border-radius: 10px;
  display: flex; align-items: center; gap: 10px;
  cursor: pointer; transition: all 0.3s;
  background: rgba(255,255,255,0.03);
}
.radio-opt:hover { border-color: var(--gold); background: rgba(201,168,76,0.06); }
.radio-opt input[type=radio] { display:none; }
.radio-opt.selected {
  border-color: var(--gold);
  background: rgba(201,168,76,0.12);
  box-shadow: 0 0 16px rgba(201,168,76,0.15);
}
.radio-dot {
  width: 14px; height: 14px;
  border: 2px solid rgba(201,168,76,0.4);
  border-radius: 50%; position: relative; flex-shrink: 0;
}
.radio-opt.selected .radio-dot { border-color: var(--gold); }
.radio-opt.selected .radio-dot::after {
  content: ''; position: absolute; inset: 2px;
  background: var(--gold); border-radius: 50%;
}
.radio-text { font-size: 14px; color: var(--silver); }

/* ── SUBMIT BUTTON ── */
.ritual-btn {
  width: 100%; margin-top: 36px;
  padding: 18px 32px;
  background: linear-gradient(135deg, #3a2060 0%, #5a2080 50%, #3a2060 100%);
  border: 1px solid var(--gold-dim);
  border-radius: 12px;
  color: var(--gold-light);
  font-family: 'Cinzel', serif;
  font-size: 14px; font-weight: 600; letter-spacing: 4px;
  text-transform: uppercase;
  cursor: pointer;
  position: relative; overflow: hidden;
  transition: all 0.4s ease;
  box-shadow: 0 4px 30px rgba(80,40,160,0.4);
}
.ritual-btn::before {
  content: '';
  position: absolute; inset: 0;
  background: linear-gradient(135deg, transparent 30%, rgba(201,168,76,0.15) 50%, transparent 70%);
  transform: translateX(-100%);
  transition: transform 0.6s ease;
}
.ritual-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 40px rgba(80,40,160,0.6), 0 0 20px var(--glow-gold); border-color: var(--gold); }
.ritual-btn:hover::before { transform: translateX(100%); }
.ritual-btn:active { transform: translateY(0); }

/* ── LOADING SCREEN ── */
#loading {
  display: none; text-align: center; padding: 80px 40px;
  animation: fadeIn 0.5s ease;
}
.loading-sigil {
  width: 120px; height: 120px; margin: 0 auto 40px;
  position: relative;
}
.sigil-ring {
  position: absolute; inset: 0; border-radius: 50%;
  border: 2px solid transparent;
}
.sigil-ring-1 {
  border-top-color: var(--gold);
  border-right-color: rgba(201,168,76,0.3);
  animation: spin 2s linear infinite;
}
.sigil-ring-2 {
  inset: 12px;
  border-top-color: var(--rose);
  border-left-color: rgba(232,180,184,0.3);
  animation: spin 1.4s linear infinite reverse;
}
.sigil-ring-3 {
  inset: 24px;
  border-top-color: var(--silver);
  border-bottom-color: rgba(212,207,232,0.3);
  animation: spin 1.8s linear infinite;
}
.sigil-core {
  position: absolute; inset: 36px;
  background: radial-gradient(circle, var(--gold-dim), transparent);
  border-radius: 50%;
  animation: pulse-core 2s ease-in-out infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
@keyframes pulse-core { 0%,100%{opacity:0.4;transform:scale(0.8)} 50%{opacity:1;transform:scale(1.1)} }

.loading-text {
  font-family: 'Cinzel', serif; font-size: 13px;
  letter-spacing: 4px; color: var(--gold-dim);
  animation: pulse-text 2s ease-in-out infinite;
}
@keyframes pulse-text { 0%,100%{opacity:0.5} 50%{opacity:1} }
.loading-steps { margin-top: 24px; display: flex; flex-direction: column; gap: 10px; align-items: center; }
.loading-step {
  font-size: 13px; color: var(--silver-dim);
  opacity: 0; transform: translateY(8px);
  transition: all 0.5s ease;
}
.loading-step.visible { opacity: 1; transform: translateY(0); }

/* ── RESULTS ── */
#results { display: none; animation: fadeIn 0.8s ease; }

.results-header {
  text-align: center; margin-bottom: 48px;
}
.results-name {
  font-family: 'Cinzel', serif; font-size: 13px;
  letter-spacing: 5px; color: var(--gold); margin-bottom: 12px;
}
.results-title {
  font-family: 'Cinzel', serif; font-size: clamp(24px,4vw,42px);
  background: linear-gradient(135deg, var(--gold-light), var(--rose));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  background-clip: text;
  margin-bottom: 8px;
}
.results-subtitle {
  font-family: 'EB Garamond', serif; font-style: italic;
  color: var(--silver-dim); font-size: 16px;
}

/* ── TRINITY SECTION ── */
.trinity { display: grid; grid-template-columns: repeat(3,1fr); gap: 16px; margin-bottom: 40px; }
.trinity-card {
  background: rgba(20,14,60,0.8);
  border: 1px solid rgba(201,168,76,0.2);
  border-radius: 16px; padding: 24px 18px;
  text-align: center; position: relative; overflow: hidden;
  transition: transform 0.3s, box-shadow 0.3s;
}
.trinity-card:hover { transform: translateY(-4px); box-shadow: 0 12px 40px rgba(80,40,160,0.4); }
.trinity-card::before {
  content: ''; position: absolute; top: 0; left: 0; right: 0; height: 1px;
  background: linear-gradient(90deg, transparent, var(--gold-dim), transparent);
}
.trinity-icon { font-size: 32px; margin-bottom: 12px; line-height: 1; }
.trinity-label { font-family: 'Cinzel', serif; font-size: 9px; letter-spacing: 4px; color: var(--gold-dim); text-transform: uppercase; margin-bottom: 6px; }
.trinity-value { font-family: 'Cinzel', serif; font-size: 22px; color: var(--gold-light); margin-bottom: 6px; }
.trinity-sub { font-size: 12px; color: var(--silver-dim); line-height: 1.5; }

/* ── PERSONALITY SECTION ── */
.result-block {
  background: rgba(20,14,60,0.7);
  border: 1px solid rgba(201,168,76,0.15);
  border-radius: 20px; padding: 36px 36px;
  margin-bottom: 24px; position: relative; overflow: hidden;
}
.result-block::before {
  content: ''; position: absolute; top: 0; left: 0; right: 0; height: 1px;
  background: linear-gradient(90deg, transparent, var(--gold-dim), var(--rose-dim), transparent);
}
.block-header {
  display: flex; align-items: center; gap: 14px; margin-bottom: 24px;
}
.block-icon { font-size: 24px; }
.block-title { font-family: 'Cinzel', serif; font-size: 16px; color: var(--gold-light); letter-spacing: 2px; }
.block-content { font-size: 15px; line-height: 1.9; color: var(--silver); }
.block-content p { margin-bottom: 12px; }
.block-content p:last-child { margin-bottom: 0; }
.highlight { color: var(--gold-light); font-weight: 500; }
.highlight-rose { color: var(--rose); font-weight: 500; }

/* ── TAROT CARDS ── */
.tarot-row {
  display: grid; grid-template-columns: repeat(3,1fr); gap: 20px;
  margin: 24px 0;
}
.tarot-card {
  background: linear-gradient(160deg, rgba(40,20,80,0.9), rgba(20,10,50,0.95));
  border: 1px solid rgba(201,168,76,0.3);
  border-radius: 16px; padding: 24px 16px;
  text-align: center; cursor: pointer; position: relative;
  overflow: hidden; transition: all 0.4s ease;
  aspect-ratio: 2/3.2;
  display: flex; flex-direction: column; justify-content: center; align-items: center; gap: 10px;
}
.tarot-card:hover { transform: translateY(-6px) rotate(1deg); box-shadow: 0 20px 60px rgba(80,40,160,0.5), 0 0 30px var(--glow-gold); }
.tarot-card::before {
  content: '';
  position: absolute; inset: 6px;
  border: 1px solid rgba(201,168,76,0.15);
  border-radius: 12px; pointer-events: none;
}
.tarot-suit { font-size: 36px; }
.tarot-position { font-family: 'Cinzel', serif; font-size: 9px; letter-spacing: 3px; color: var(--gold-dim); text-transform: uppercase; }
.tarot-name { font-family: 'Cinzel', serif; font-size: 13px; color: var(--gold-light); line-height: 1.3; }
.tarot-keyword { font-size: 12px; color: var(--rose); font-style: italic; font-family: 'EB Garamond', serif; }
.tarot-desc { font-size: 12px; color: var(--silver-dim); line-height: 1.6; }
.tarot-reversed { display: inline-block; background: rgba(232,180,184,0.15); border: 1px solid rgba(232,180,184,0.3); border-radius: 4px; padding: 2px 8px; font-size: 10px; color: var(--rose); letter-spacing: 1px; margin-top: 2px; }

/* ── FORTUNE AREAS ── */
.fortune-grid {
  display: grid; grid-template-columns: 1fr 1fr; gap: 16px;
}
.fortune-item {
  background: rgba(255,255,255,0.025);
  border: 1px solid rgba(201,168,76,0.12);
  border-radius: 14px; padding: 22px 20px;
  transition: all 0.3s;
}
.fortune-item:hover { border-color: rgba(201,168,76,0.3); background: rgba(201,168,76,0.04); }
.fortune-area {
  display: flex; align-items: center; gap: 10px; margin-bottom: 14px;
}
.fortune-emoji { font-size: 20px; }
.fortune-label { font-family: 'Cinzel', serif; font-size: 11px; letter-spacing: 3px; color: var(--gold); text-transform: uppercase; }
.fortune-score {
  display: flex; align-items: center; gap: 8px; margin-bottom: 12px;
}
.score-bar { flex: 1; height: 4px; background: rgba(255,255,255,0.08); border-radius: 2px; overflow: hidden; }
.score-fill { height: 100%; border-radius: 2px; transition: width 1.5s ease; }
.score-num { font-family: 'Cinzel', serif; font-size: 13px; color: var(--gold-light); min-width: 32px; text-align: right; }
.fortune-text { font-size: 13px; color: var(--silver-dim); line-height: 1.8; }
.lucky-tags { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 12px; }
.lucky-tag {
  background: rgba(201,168,76,0.1);
  border: 1px solid rgba(201,168,76,0.2);
  border-radius: 20px; padding: 3px 10px;
  font-size: 11px; color: var(--gold-dim); letter-spacing: 1px;
}

/* ── MONTHLY TIMELINE ── */
.month-timeline { display: flex; flex-direction: column; gap: 0; }
.month-item {
  display: flex; gap: 20px; align-items: flex-start;
  padding: 16px 0; border-bottom: 1px solid rgba(201,168,76,0.08);
}
.month-item:last-child { border-bottom: none; }
.month-badge {
  flex-shrink: 0; width: 56px; height: 56px;
  background: radial-gradient(circle, rgba(80,40,160,0.5), rgba(40,20,80,0.8));
  border: 1px solid rgba(201,168,76,0.25);
  border-radius: 12px; display: flex; flex-direction: column;
  align-items: center; justify-content: center; gap: 1px;
}
.month-num { font-family: 'Cinzel', serif; font-size: 18px; color: var(--gold-light); line-height: 1; }
.month-unit { font-size: 9px; letter-spacing: 2px; color: var(--gold-dim); }
.month-body { flex: 1; padding-top: 4px; }
.month-stars { color: var(--gold); font-size: 12px; margin-bottom: 4px; }
.month-text { font-size: 13px; color: var(--silver-dim); line-height: 1.8; }
.month-theme {
  display: inline-block; margin-bottom: 6px;
  font-family: 'Cinzel', serif; font-size: 12px;
  color: var(--rose); letter-spacing: 1px;
}

/* ── LUCKY ELEMENTS ── */
.lucky-row { display: grid; grid-template-columns: repeat(4,1fr); gap: 12px; margin-top: 8px; }
.lucky-box {
  background: rgba(255,255,255,0.025);
  border: 1px solid rgba(201,168,76,0.15);
  border-radius: 12px; padding: 16px 12px;
  text-align: center;
}
.lucky-box-label { font-size: 9px; letter-spacing: 3px; color: var(--gold-dim); text-transform: uppercase; margin-bottom: 8px; }
.lucky-box-value { font-family: 'Cinzel', serif; font-size: 15px; color: var(--gold-light); }
.lucky-box-sub { font-size: 11px; color: var(--silver-dim); margin-top: 4px; }

/* ── ORACLE MESSAGE ── */
.oracle-box {
  background: linear-gradient(135deg, rgba(60,20,100,0.6), rgba(100,40,60,0.4));
  border: 1px solid rgba(201,168,76,0.3);
  border-radius: 20px; padding: 36px 40px;
  text-align: center; margin-bottom: 24px;
  position: relative; overflow: hidden;
}
.oracle-box::before {
  content: '"';
  position: absolute; top: -20px; left: 24px;
  font-family: 'Cinzel', serif; font-size: 120px;
  color: rgba(201,168,76,0.06); line-height: 1;
  pointer-events: none;
}
.oracle-text {
  font-family: 'EB Garamond', serif; font-size: 20px;
  font-style: italic; line-height: 1.9; color: var(--silver);
  position: relative;
}
.oracle-text .oracle-gold { color: var(--gold-light); }

/* ── RESTART BUTTON ── */
.restart-btn {
  display: block; margin: 40px auto 0;
  padding: 14px 40px;
  background: transparent;
  border: 1px solid rgba(201,168,76,0.35);
  border-radius: 40px;
  color: var(--gold-dim);
  font-family: 'Cinzel', serif; font-size: 11px; letter-spacing: 4px;
  text-transform: uppercase; cursor: pointer;
  transition: all 0.3s;
}
.restart-btn:hover { border-color: var(--gold); color: var(--gold-light); background: rgba(201,168,76,0.08); }

/* ── ANIMATIONS ── */
@keyframes fadeDown { from{opacity:0;transform:translateY(-20px)} to{opacity:1;transform:none} }
@keyframes fadeUp { from{opacity:0;transform:translateY(30px)} to{opacity:1;transform:none} }
@keyframes fadeIn { from{opacity:0} to{opacity:1} }

.reveal {
  opacity: 0; transform: translateY(20px);
  transition: opacity 0.7s ease, transform 0.7s ease;
}
.reveal.in { opacity: 1; transform: none; }

/* ── RESPONSIVE ── */
@media(max-width:640px){
  .ritual-card { padding: 32px 20px; }
  .form-grid { grid-template-columns: 1fr; }
  .form-field.full { grid-column: 1; }
  .trinity { grid-template-columns: 1fr; }
  .tarot-row { grid-template-columns: 1fr; }
  .fortune-grid { grid-template-columns: 1fr; }
  .lucky-row { grid-template-columns: repeat(2,1fr); }
  .result-block { padding: 24px 20px; }
}

/* ── ONLINE COUNTER ── */
#online-counter {
  position: fixed; top: 20px; left: 20px; z-index: 999;
  display: flex; align-items: center; gap: 10px;
  background: rgba(10,8,32,0.85);
  border: 1px solid rgba(201,168,76,0.25);
  border-radius: 40px;
  padding: 8px 16px 8px 12px;
  backdrop-filter: blur(12px);
  box-shadow: 0 4px 24px rgba(0,0,0,0.4);
  animation: fadeDown 1s ease 0.5s both;
  transition: border-color 0.3s;
}
#online-counter:hover { border-color: rgba(201,168,76,0.5); }
.counter-pulse {
  width: 8px; height: 8px;
  background: #4ade80;
  border-radius: 50%;
  position: relative; flex-shrink: 0;
}
.counter-pulse::before {
  content: '';
  position: absolute; inset: -3px;
  background: rgba(74,222,128,0.4);
  border-radius: 50%;
  animation: ping 2s ease-in-out infinite;
}
@keyframes ping {
  0%,100% { transform: scale(1); opacity: 0.6; }
  50% { transform: scale(1.8); opacity: 0; }
}
.counter-text {
  font-family: 'Cinzel', serif;
  font-size: 11px; letter-spacing: 1px;

(function(){
  const canvas = document.getElementById('starfield');
  const ctx = canvas.getContext('2d');
  let stars = [];
  function resize(){
    canvas.width = window.innerWidth;
    canvas.height = document.body.scrollHeight;
  }
  function makeStars(){
    stars = [];
    const count = Math.floor((canvas.width * canvas.height) / 4000);
    for(let i=0;i<count;i++){
      stars.push({
        x: Math.random()*canvas.width,
        y: Math.random()*canvas.height,
        r: Math.random()*1.5+0.3,
        op: Math.random()*0.7+0.1,
        speed: Math.random()*2+1,
        phase: Math.random()*Math.PI*2
      });
    }
  }
  let t = 0;
  function draw(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    t += 0.008;
    stars.forEach(s=>{
      const op = s.op * (0.5 + 0.5 * Math.sin(t*s.speed + s.phase));
      ctx.beginPath();
      ctx.arc(s.x, s.y, s.r, 0, Math.PI*2);
      ctx.fillStyle = `rgba(255,255,255,${op})`;
      ctx.fill();
    });
    requestAnimationFrame(draw);
  }
  window.addEventListener('resize', ()=>{ resize(); makeStars(); });
  resize(); makeStars(); draw();
})();

function drawTarot(seed){
  const used = new Set();
  const cards = [];
  let s = seed;
  while(cards.length < 3){
    s = (s * 1664525 + 1013904223) & 0x7fffffff;
    const idx = s % TAROT_MAJOR.length;
    if(!used.has(idx)){ used.add(idx); cards.push({...TAROT_MAJOR[idx], reversed: s % 7 === 0}); }
  }
  return cards;
}

function getStrokes(char){
  return STROKE_MAP[char] || Math.max(1, (char.charCodeAt(0) % 25) + 3);
}

// ── 姓名學：五格計算 ──
function calcFiveGrid(fullName){
  const chars = fullName.split('');
  if(chars.length < 2) return null;
  const strokes = chars.map(getStrokes);
  const total = strokes.reduce((a,b)=>a+b, 0);
  const surname = strokes[0];
  const givenStrokes = strokes.slice(1);
  const givenSum = givenStrokes.reduce((a,b)=>a+b, 0);

  const raw = {
    天格: surname + 1,
    人格: surname + givenStrokes[0],
    地格: givenSum,
    外格: chars.length === 2 ? givenStrokes[0] + 1 : givenStrokes[givenStrokes.length-1] + 1,
    總格: total,
  };
  const reduced = {};
  for(const k in raw){ reduced[k] = reduceNum(raw[k]); }
  return { raw, reduced, strokes, chars };
}

function reduceNum(n){
  if(n <= 0) return 1;
  while(n > 81){ n = String(n).split('').reduce((a,c)=>a+parseInt(c),0); }
  return n;
}

const FIREBASE_DB_URL = FIREBASE_CONFIG.databaseURL;

(async function initOnlineCounter(){
  if(FIREBASE_DB_URL.includes('YOUR_PROJECT_ID')){
    // Firebase 尚未設定，顯示等待中提示
    document.getElementById('counter-num').textContent = '?';
    document.querySelector('.counter-text').textContent = '未連線';
    return;
  }

  // 用 Firebase REST API（不需要 SDK，直接 fetch 即可）
  const sessionId = crypto.randomUUID();
  const userPath = `${FIREBASE_DB_URL}/online_users/${sessionId}.json`;

  // 寫入自己
  async function heartbeat(){
    try {
      await fetch(`${userPath}?auth=`, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ ts: Date.now() }),
        keepalive: true
      });
    } catch(e){}
  }

  // 刪除自己（離開時）
  async function removeMe(){
    try {
      await fetch(`${userPath}?auth=`, { method: 'DELETE', keepalive: true });
    } catch(e){}
  }

  // 取得在線人數
  async function fetchCount(){
    try {
      // 清除 5 分鐘以上未更新的 stale 記錄（在 Firebase Rules 設定 expire，或這裡過濾）
      const res = await fetch(`${FIREBASE_DB_URL}/online_users.json?shallow=true`);
      if(!res.ok) return null;
      const data = await res.json();
      if(!data) return 0;
      return Object.keys(data).length;
    } catch(e){ return null; }
  }

  function updateDisplay(count){
    const el = document.getElementById('counter-num');
    const prev = parseInt(el.textContent) || 0;
    if(count === null){ el.textContent = '–'; return; }
    el.textContent = count;
    if(count !== prev){
      el.classList.add('bump');
      setTimeout(()=>el.classList.remove('bump'), 400);
    }
  }

  // 初始化
  await heartbeat();
  const initial = await fetchCount();
  updateDisplay(initial);

  // 每 30 秒心跳 + 更新人數
  setInterval(async ()=>{
    await heartbeat();
    const c = await fetchCount();
    updateDisplay(c);
  }, 30000);

  // 離開時移除
  window.addEventListener('beforeunload', removeMe);
  document.addEventListener('visibilitychange', ()=>{
    if(document.visibilityState === 'hidden') removeMe();
    else heartbeat();
  });
})();
</script>
